name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Tests (pytest)
        run: uv run pytest -q --cov=oc --cov-report=term-missing

  frontend:
    name: Frontend (lint + typecheck + unit + e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (eslint)
        run: pnpm lint

      - name: Type-check (vue-tsc)
        run: pnpm typecheck

      - name: Unit tests (vitest)
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: E2E tests (playwright)
        # Edge uses the Microsoft Edge channel which is unavailable on
        # GitHub-hosted Linux runners; we run only the chrome-* and
        # firefox-* projects in CI. Edge shares its engine with Chrome
        # so the developer machine's headed run covers it.
        env:
          CI: "true"
        run: >-
          pnpm test:e2e
          --project=chrome-mobile  --project=chrome-tablet  --project=chrome-desktop
          --project=firefox-mobile --project=firefox-tablet --project=firefox-desktop

      - name: Upload e2e artifacts (screenshots + report)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/e2e/screenshots/
          retention-days: 14

  docker:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: ocrd-backend:ci
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: ocrd-frontend:ci
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000/api
            VITE_USE_MSW=false
