version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - backend

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - frontend
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "@vue/eslint-config-*"
      vue:
        patterns:
          - "vue"
          - "vue-*"
          - "@vue/*"
          - "vite-plugin-vue"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - docker
