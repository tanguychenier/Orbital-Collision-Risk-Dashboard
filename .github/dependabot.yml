version: 2
updates:
  # Skipping major version bumps in every ecosystem below. Framework /
  # toolchain majors (FastAPI, SQLAlchemy, Pydantic, ESLint, TypeScript,
  # Pinia, Vue, Python, Node, Nginx, GitHub Actions) tend to break the
  # build and we want to vet those manually rather than auto-open PRs
  # that pile up unmerged.
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - backend
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - frontend
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "@vue/eslint-config-*"
      vue:
        patterns:
          - "vue"
          - "vue-*"
          - "@vue/*"
          - "vite-plugin-vue"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - ci
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - docker
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - docker
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
